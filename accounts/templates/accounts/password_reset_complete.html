{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-orange-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-orange-100 text-center">
        <div>
            <svg class="mx-auto h-16 w-16 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 class="mt-6 text-center text-3xl font-lalezar text-orange-600">
                {% trans "تم تغيير كلمة المرور بنجاح" %}
            </h2>
            <p class="mt-4 text-sm text-gray-600 font-cairo">
                {% trans "يمكنك الآن تسجيل الدخول باستخدام كلمة المرور الجديدة." %}
            </p>
        </div>

        <div class="text-center font-cairo text-sm pt-4">
            <a href="{% url 'accounts:login' %}" class="font-bold text-orange-600 hover:text-orange-500">{% trans "تسجيل الدخول" %}</a>
        </div>
    </div>
</div>
{% endblock %}
