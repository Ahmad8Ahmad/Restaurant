{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-orange-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-orange-100">
        <div>
            <h2 class="mt-6 text-center text-3xl font-lalezar text-orange-600">
                تسجيل الدخول
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600 font-cairo">
                مرحباً بك مجدداً في طعميني
            </p>
        </div>
        {% if form.errors %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
            <strong class="font-bold">خطأ!</strong>
            <span class="block sm:inline">الرجاء التحقق من اسم المستخدم وكلمة المرور.</span>
            </div>
        {% endif %}
        
        <form class="mt-8 space-y-6" method="POST" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4 font-cairo">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني</label>
                    <input type="email" name="username" required class="w-full px-4 py-2 border border-orange-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border border-orange-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500">
                </div>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-orange-600 hover:bg-orange-700 transition-all font-cairo">
                    دخول
                </button>
            </div>
        </form>
        
        <div class="text-center font-cairo text-sm">
            <p class="text-gray-600">ليس لديك حساب؟ 
                <a href="{% url 'register' %}" class="font-bold text-orange-600 hover:text-orange-500">إنشاء حساب جديد</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
