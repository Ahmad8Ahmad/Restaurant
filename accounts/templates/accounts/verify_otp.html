{% extends 'base.html' %}{% load i18n %}
{% block title %}{% trans "تأكيد الحساب" %}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
  <div class="w-full max-w-md mx-auto bg-white rounded-3xl shadow-xl p-6 sm:p-8 border border-gray-100">
    <div class="text-center space-y-3 mb-8">
      <div class="w-16 h-16 bg-orange-100 rounded-2xl flex items-center justify-center mx-auto mb-2">
        <i class="fas fa-envelope text-orange-500 text-2xl"></i>
      </div>
      <h1 class="text-2xl sm:text-3xl font-black text-gray-800">{% trans "تأكيد الحساب" %}</h1>
      <p class="text-gray-500 text-sm font-bold leading-relaxed">{% trans "تم إرسال كود التحقق إلى بريدك الإلكتروني. يرجى إدخاله أدناه." %}</p>
    </div>

    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <div class="space-y-2">
        <label for="otp" class="block text-sm font-black text-gray-700">{% trans "كود التحقق (OTP)" %}</label>
        <input type="text" name="otp" id="otp" maxlength="6" inputmode="numeric" pattern="[0-9]*"
               placeholder="000000"
               class="w-full text-center text-2xl sm:text-3xl tracking-[0.5em] font-black py-4 px-4 bg-orange-50/60 border-2 border-orange-100 rounded-xl text-gray-800 placeholder:text-gray-300 focus:outline-none focus:ring-2 focus:ring-orange-400/40 focus:border-orange-400 transition-all duration-300"
               required autofocus>
      </div>

      <button type="submit" class="w-full py-4 bg-orange-600 hover:bg-orange-700 text-white font-black text-lg rounded-xl shadow-md hover:shadow-lg transition-all duration-300 cursor-pointer">
        <i class="fas fa-check-circle ml-2"></i>{% trans "تأكيد الكود" %}
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'register' %}" class="inline-flex items-center gap-2 text-gray-400 hover:text-orange-600 font-bold text-sm transition-colors duration-200">
        <i class="fas fa-arrow-right text-xs"></i>{% trans "الرجوع للتسجيل" %}
      </a>
    </div>
  </div>
</div>
{% endblock %}
