{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">تأكيد الحساب</h3>
                    <p class="text-muted text-center">
                        تم إرسال كود التحقق إلى بريدك الإلكتروني. يرجى إدخاله أدناه.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="otp" class="form-label">كود التحقق (OTP)</label>
                            <input type="text" name="otp" id="otp" class="form-control text-center" placeholder="000000" maxlength="6" required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">تأكيد الكود</button>
                        </div>
                    </form>
                    
                    <div class="mt-3 text-center">
                        <a href="{% url 'register' %}" class="text-decoration-none">الرجوع للتسجيل</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
