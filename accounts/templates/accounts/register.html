{% extends 'base.html' %} 
{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg border border-orange-200 rounded-xl">
    <h2 class="text-2xl font-lalezar text-orange-600 text-center mb-6">Create Account</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="mb-4 font-cairo">
                <label class="block text-gray-700 text-sm mb-1">{{ field.label }}</label>
                {{ field }} {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl transition-all">
            Create Account
        </button>
    </form>
</div>
{% endblock %}
