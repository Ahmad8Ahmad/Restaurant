{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div
  class="max-w-md mx-auto bg-white p-8 border rounded-lg shadow-lg text-center"
>
  <h2 class="text-2xl font-bold mb-4">{% trans "إتمام عملية الدفع" %}</h2>
  <p class="mb-6">
    {% trans "أنت على وشك دفع مبلغ:" %}
    <span class="text-green-600 font-bold">{{ order.total_price }} {% trans "ل.س" %}</span>
  </p>

  <form method="POST" action="{% url 'payments:success' order.id %}">
    {% csrf_token %}
    <input type="hidden" name="order_id" value="{{ order.id }}" />
    <button
      type="submit"
      class="w-full bg-blue-600 text-gray-500 py-3 rounded-lg font-bold hover:bg-blue-700"
    >
      {% trans "ادفع الآن (تجريبي)" %}
    </button>
  </form>
</div>
{% endblock %}
