{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl text-center border-t-8 border-green-500">
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6 text-green-600 font-bold text-3xl">✓</div>
        
        <h2 class="text-3xl font-black text-gray-900 mb-2 italic">{% trans "تم الدفع بنجاح!" %}</h2>
        <p class="text-gray-600 mb-10 text-lg">{% trans "طلبك رقم" %} <span class="text-orange-600 font-bold">#{{ order.id }}</span> {% trans "قيد التحضير." %}</p>

        <div class="space-y-4">
            <a href="{% url 'delivery:track_delivery' order.id %}" 
               class="w-full flex items-center justify-center px-6 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition-all gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                {% trans "تتبع التوصيل" %}
            </a>

            <a href="{% url 'restaurants:restaurant_list' %}" 
               class="w-full block py-3 text-gray-500 bg-gray-100 rounded-xl font-semibold hover:bg-gray-200 transition-all text-center">
                {% trans "العودة للرئيسية" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
