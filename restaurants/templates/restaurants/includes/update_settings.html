<div id="infoModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" style="display:none;">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 text-right shadow-2xl">
        <h3 class="text-2xl font-black mb-6">تعديل البيانات</h3>
        <form method="POST" action="{% url 'restaurants:update_restaurant_settings' %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2 mr-2">الاسم</label>
                <input type="text" name="name" value="{{ restaurant.name }}" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-orange-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2 mr-2">الهاتف</label>
                <input type="text" name="phone" value="{{ restaurant.phone|default:'' }}" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-orange-500 outline-none text-left" dir="ltr">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2 mr-2">العنوان</label>
                <input type="text" name="address" value="{{ restaurant.address }}" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-orange-500 outline-none">
            </div>
            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 bg-orange-600 text-white font-black py-4 rounded-2xl cursor-pointer">حفظ</button>
                <button type="button" onclick="this.closest('#infoModal').style.display='none'" class="flex-1 bg-gray-100 text-gray-500 font-bold py-4 rounded-2xl cursor-pointer">إلغاء</button>
            </div>
        </form>
    </div>
</div>

<div id="logoModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" style="display:none;">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl">
        <h3 class="text-2xl font-black mb-6 text-gray-900">تغيير اللوجو</h3>
        <form method="POST" action="{% url 'restaurants:update_restaurant_settings' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <label class="block w-full p-10 border-4 border-dashed border-gray-100 rounded-[2rem] cursor-pointer hover:border-orange-500">
                <i class="fas fa-store text-4xl text-gray-300 mb-2 block"></i>
                <span class="font-bold text-gray-500">اختر صورة الشعار</span>
                <input type="file" name="logo" class="hidden" onchange="this.form.submit()">
            </label>
            <button type="button" onclick="this.closest('#logoModal').style.display='none'" class="mt-4 text-gray-400 font-bold cursor-pointer">إغلاق</button>
        </form>
    </div>
</div>

<div id="coverModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" style="display:none;">
    <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-8 text-center shadow-2xl">
        <h3 class="text-2xl font-black mb-6">تغيير الغلاف</h3>
        <form method="POST" action="{% url 'restaurants:update_restaurant_settings' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <label class="block w-full p-10 border-4 border-dashed border-gray-100 rounded-[2rem] cursor-pointer hover:border-orange-500">
                <i class="fas fa-image text-4xl text-gray-300 mb-2 block"></i>
                <span class="font-bold text-gray-500">اختر صورة الغلاف</span>
                <input type="file" name="cover_image" class="hidden" onchange="this.form.submit()">
            </label>
            <button type="button" onclick="this.closest('#coverModal').style.display='none'" class="mt-4 text-gray-400 font-bold cursor-pointer">إغلاق</button>
        </form>
    </div>
</div>
