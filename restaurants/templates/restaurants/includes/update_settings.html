{% load i18n %}
<div id="infoModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" style="display:none;">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-l from-orange-500 to-orange-600 p-5 text-right">
            <div class="flex items-center justify-between">
                <button type="button" onclick="closeInfoModal()" class="text-white/80 hover:text-white text-2xl cursor-pointer">
                    <i class="fas fa-times"></i>
                </button>
                <h3 class="text-xl font-black text-white flex items-center gap-2">
                    <i class="fas fa-pen"></i> {% trans "تعديل المعلومات" %}
                </h3>
            </div>
        </div>

        <form method="POST" action="{% url 'restaurants:update_restaurant_settings' %}" class="p-6 space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2 mr-1">{% trans "اسم المطعم" %}</label>
                <div class="relative">
                    <i class="fas fa-utensils absolute right-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" name="name" value="{{ restaurant.name }}" class="w-full p-4 pr-12 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-orange-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2 mr-1">{% trans "رقم الهاتف" %}</label>
                <div class="relative">
                    <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" name="phone" value="{{ restaurant.phone|default:'' }}" class="w-full p-4 pr-12 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-orange-500 outline-none transition-all text-left" dir="ltr">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-400 mb-2 mr-1">{% trans "العنوان" %}</label>
                <div class="relative">
                    <i class="fas fa-map-marker-alt absolute right-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" name="address" value="{{ restaurant.address }}" class="w-full p-4 pr-12 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-orange-500 outline-none transition-all">
                </div>
            </div>

            <div class="mb-4"></div>

            <div class="flex gap-3">
                <button type="submit" class="flex-1 bg-orange-500 text-white font-bold py-3 rounded-2xl hover:bg-orange-600 transition-all cursor-pointer text-sm">
                    <i class="fas fa-check ml-2"></i> {% trans "حفظ" %}
                </button>
                <button type="button" onclick="closeInfoModal()" class="flex-1 bg-orange-50 text-orange-500 font-bold py-3 rounded-2xl border border-orange-500 hover:bg-orange-100 transition-all cursor-pointer text-sm">
                    {% trans "إلغاء" %}
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function openInfoModal() {
    document.getElementById('infoModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closeInfoModal() {
    document.getElementById('infoModal').style.display = 'none';
    document.body.style.overflow = '';
}
</script>
