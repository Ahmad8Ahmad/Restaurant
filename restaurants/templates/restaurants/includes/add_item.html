{% load i18n %}
<div class="bg-white p-6 rounded-2xl">
    <h3 class="text-lg font-bold mb-4 text-gray-800">{% trans "إضافة وجبة جديدة" %}</h3>
    <form method="POST" action="{% url 'restaurants:add_menu_item' %}" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {% for field in item_form %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-orange-600 transition-all">
            {% trans "تأكيد الإضافة للمنيو" %}
        </button>
    </form>
</div>
