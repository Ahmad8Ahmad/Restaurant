{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-gray-50 py-10 px-4">
    <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black text-gray-900">📍 تتبع مباشر للطلب {{ delivery.order.id }}</h2>
            <span class="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold text-sm">قيد التوصيل</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white rounded-[2rem] shadow-xl overflow-hidden h-[500px] border-4 border-white">
              <div class="relative w-full rounded-2xl shadow-lg overflow-hidden border-4 border-white" style="height: 500px; min-height: 500px;">
    <div id="map" class="h-full w-full"></div>
</div>

            </div>

            <div class="bg-white rounded-[2rem] shadow-xl p-8 border border-gray-100 h-fit">
                <div class="text-center mb-8">
                    <div class="w-24 h-24 bg-orange-100 rounded-full mx-auto mb-4 flex items-center justify-center">
                         <svg class="w-12 h-12 text-orange-600" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                    </div>
                    <h3 class="text-2xl font-black text-gray-900">{{ delivery.order.driver.name }}</h3>
                    <p class="text-sm text-gray-500 mt-1 italic">{{ delivery.order.driver.phone }}</p>
                </div>

                <div class="space-y-4 py-6 border-y border-gray-50">
                    <div class="flex justify-between">
                        <span class="text-gray-400">المطعم:</span>
                        <span class="font-bold text-gray-800">{{ delivery.order.restaurant.name }}</span>
                    </div>
                    <div class="flex justify-between text-green-600 font-bold">
                        <span>حالة الدفع:</span>
                        <span>مكتمل ✓</span>
                    </div>
                </div>

                <a href="tel:0790000000" class="w-full mt-8 flex items-center justify-center px-6 py-4 bg-green-500 text-white rounded-2xl font-black hover:bg-green-600 transition-all shadow-lg gap-3">
                    اتصال بالسائق
                </a>
            </div>
        </div>
    </div>
 <script>
    // انتظر تحميل الصفحة بالكامل
     window.onload = function() {
        // 1. تعريف الخريطة
        var map = L.map('map').setView([55.6050, 13.0038], 13);
        
        // 2. إضافة الطبقة (Tiles)
       L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        setTimeout(function() {
            map.invalidateSize();
        }, 500);


        // 3. إضافة الماركر
        var marker = L.marker([55.6050, 13.0038]).addTo(map);

        // 4. الربط مع السوكت
        const orderId = window.location.pathname.split('/').filter(Boolean).pop();
        const socket = new WebSocket(`ws://${window.location.host}/ws/delivery/${orderId}/`);

        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            console.log("تم استلام موقع السائق:", data);
            
            if(data.lat && data.lng) {
                const newPos = [data.lat, data.lng];
                marker.setLatLng(newPos);
                map.setView(newPos, 15);
            }
        };

        socket.onopen = () => console.log("متصل بالسوكت بنجاح!");
        socket.onerror = (error) => console.error("خطأ في السوكت:", error);
    };
</script>
</div>
{% endblock %}
