{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div
  class="max-w-md mx-auto bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-xl border border-gray-100 text-center"
>
  <h2 class="text-2xl font-bold mb-4">{% trans "اختيار طريقة الدفع" %}</h2>
  <p class="mb-6">
    {% trans "مبلغ الطلب:" %}
    <span class="text-green-600 font-bold">{{ order.total_price }} {% trans "ل.س" %}</span>
  </p>

  <form method="POST" action="{% url 'payments:process' order.id %}">
    {% csrf_token %}
    <input type="hidden" name="order_id" value="{{ order.id }}" />

    <div class="space-y-4 mb-6 text-right" id="paymentOptions">
      <label class="payment-label flex items-center gap-3 p-4 border-2 rounded-xl cursor-pointer transition-all hover:border-orange-400 border-orange-500 bg-orange-50">
        <input type="radio" name="payment_method" value="Card" checked class="accent-orange-500 w-5 h-5" />
        <div class="text-right">
          <span class="font-bold text-gray-800">{% trans "بطاقة إئتمانية / دفع إلكتروني" %}</span>
          <p class="text-xs text-gray-500">{% trans "ادفع الآن عبر الإنترنت" %}</p>
        </div>
      </label>

      <label class="payment-label flex items-center gap-3 p-4 border-2 rounded-xl cursor-pointer transition-all hover:border-orange-400 border-gray-200 bg-white">
        <input type="radio" name="payment_method" value="Cash" class="accent-orange-500 w-5 h-5" />
        <div class="text-right">
          <span class="font-bold text-gray-800">{% trans "الدفع عند الاستلام" %}</span>
          <p class="text-xs text-gray-500">{% trans "ادفع نقداً عند وصول الطلب" %}</p>
        </div>
      </label>
    </div>

    <button
      type="submit"
      class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition-all shadow-lg"
    >
      {% trans "تأكيد الطلب" %}
    </button>
  </form>
</div>

<script>
document.getElementById('paymentOptions').addEventListener('click', function(e) {
  var labels = this.querySelectorAll('.payment-label');
  labels.forEach(function(l) {
    var radio = l.querySelector('input[type="radio"]');
    if (radio.checked) {
      l.classList.add('border-orange-500', 'bg-orange-50');
      l.classList.remove('border-gray-200', 'bg-white');
    } else {
      l.classList.remove('border-orange-500', 'bg-orange-50');
      l.classList.add('border-gray-200', 'bg-white');
    }
  });
});
</script>
{% endblock %}
