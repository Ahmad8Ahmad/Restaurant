{% load i18n %}
<div class="bg-white p-6 rounded-2xl">
    <h3 class="text-lg font-bold mb-4 text-gray-800">{% trans "إضافة وجبة جديدة" %}</h3>
    <form method="POST" action="{% url 'restaurants:add_menu_item' %}" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{% trans "التصنيف" %}</label>
                {{ item_form.category }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{% trans "الاسم" %}</label>
                {{ item_form.name }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{% trans "الوصف" %}</label>
                {{ item_form.description }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{% trans "السعر" %}</label>
                {{ item_form.price }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">{% trans "الصورة" %}</label>
                <label class="flex items-center gap-3 w-full p-3 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50/50 hover:bg-gray-100 hover:border-orange-300 transition-all cursor-pointer group">
                    <span class="shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg bg-orange-500 text-white text-sm font-bold group-hover:bg-orange-600 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        {% trans "اختر صورة" %}
                    </span>
                    <span class="text-sm text-gray-400 font-bold file-name">{% trans "لم يتم اختيار ملف" %}</span>
                    {{ item_form.image }}
                </label>
            </div>
            <div class="flex items-center gap-2">
                {{ item_form.is_available }}
                <label class="text-sm font-bold text-gray-700">{% trans "متاح؟" %}</label>
            </div>
        </div>
        <button type="submit" class="w-full bg-orange-500 text-white font-bold py-3.5 rounded-2xl shadow-lg hover:bg-orange-600 hover:shadow-xl hover:scale-[1.02] transition-all duration-300 cursor-pointer">
            {% trans "تأكيد الإضافة للمنيو" %}
        </button>
    </form>
</div>
<script>
document.querySelectorAll('label:has(.file-name)').forEach(function(label) {
    var input = label.querySelector('input[type="file"]');
    var nameSpan = label.querySelector('.file-name');
    if (input) {
        input.classList.add('hidden');
        input.addEventListener('change', function() {
            nameSpan.textContent = this.files[0] ? this.files[0].name : '{% trans "لم يتم اختيار ملف" %}';
        });
    }
});
</script>
