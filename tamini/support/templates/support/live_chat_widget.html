{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}

{% if user.is_authenticated %}
<div id="live-chat-widget" class="fixed bottom-6 left-4 z-50">
  <button id="chat-toggle-btn" class="w-14 h-14 bg-orange-500 hover:bg-orange-600 text-white rounded-full shadow-2xl flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95">
    <svg id="chat-icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
    </svg>
    <svg id="chat-icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

  <div id="chat-panel" class="absolute bottom-16 left-0 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-gray-200 hidden overflow-hidden transition-all duration-300 opacity-0 translate-y-4">
    <div class="bg-orange-500 text-white px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
        <span class="font-bold">{% trans "الدعم المباشر" %}</span>
      </div>
      <button id="chat-minimize-btn" class="text-white/80 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
        </svg>
      </button>
    </div>

    <div id="chat-messages" class="h-80 overflow-y-auto p-4 space-y-3 bg-gray-50">
      <div class="text-center text-gray-400 text-sm py-8">
        <svg class="w-12 h-12 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <p>{% trans "كيف يمكننا مساعدتك؟" %}</p>
      </div>
    </div>

    <div class="border-t border-gray-200 p-3 bg-white">
      <form id="chat-form" class="flex gap-2">
        <input type="text" id="chat-input" placeholder="{% trans 'اكتب رسالتك...' %}" class="flex-1 px-4 py-2.5 bg-orange-50/60 text-gray-700 rounded-2xl border border-orange-100 focus:outline-none focus:ring-2 focus:ring-orange-400/40 focus:border-orange-400 text-sm" autocomplete="off">
        <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2.5 rounded-2xl transition-all text-sm font-bold">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
          </svg>
        </button>
      </form>
    </div>
  </div>
</div>

<script>
(function() {
  const chatMessages = document.getElementById('chat-messages');
  const chatForm = document.getElementById('chat-form');
  const chatInput = document.getElementById('chat-input');
  const toggleBtn = document.getElementById('chat-toggle-btn');
  const chatPanel = document.getElementById('chat-panel');
  const chatIconOpen = document.getElementById('chat-icon-open');
  const chatIconClose = document.getElementById('chat-icon-close');
  const minimizeBtn = document.getElementById('chat-minimize-btn');
  let isOpen = false;
  let closeTimeout = null;

  var chatSocket = null;
  try {
    var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    chatSocket = new WebSocket(protocol + '//' + window.location.host + '/ws/chat/');
  } catch(e) {
    console.warn('Chat WebSocket creation failed:', e);
  }

  if (chatSocket) {
    chatSocket.onmessage = function(e) {
      var data = JSON.parse(e.data);
      if (data.type === 'chat_history') {
        chatMessages.innerHTML = '';
        if (data.messages && data.messages.length === 0) {
          chatMessages.innerHTML = [
            '<div class="text-center text-gray-400 text-sm py-8">',
            '<svg class="w-12 h-12 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">',
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>',
            '</svg>',
            '<p>{% trans "كيف يمكننا مساعدتك؟" %}</p>',
            '</div>'
          ].join('');
        }
        return;
      }
      if (data.type === 'chat_message') {
        var staffLabel = '{% trans "الدعم" %}';
        addMessage(data.author, data.message, data.author === staffLabel);
      }
    };

    chatSocket.onclose = function() {
      console.log('Chat socket closed');
    };
  }

  function addMessage(author, message, isStaff) {
    var div = document.createElement('div');
    div.className = isStaff ? 'flex flex-col items-start' : 'flex flex-col items-end';
    div.innerHTML = [
      '<div class="max-w-[80%] ' + (isStaff ? 'bg-white border border-gray-200' : 'bg-orange-500 text-white') + ' rounded-2xl px-4 py-2.5 shadow-sm">',
      '<p class="text-xs font-bold mb-1 ' + (isStaff ? 'text-gray-500' : 'text-orange-200') + '">' + author + '</p>',
      '<p class="text-sm">' + escapeHtml(message) + '</p>',
      '</div>'
    ].join('');
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function escapeHtml(text) {
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  if (chatForm && chatInput && chatSocket) {
    chatForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var message = chatInput.value.trim();
      if (!message) return;
      try { chatSocket.send(JSON.stringify({message: message})); } catch(e) {}
      addMessage('{% trans "أنت" %}', message, false);
      chatInput.value = '';
    });
  }

  function toggleChat() {
    if (closeTimeout) {
      clearTimeout(closeTimeout);
      closeTimeout = null;
    }
    isOpen = !isOpen;
    if (isOpen) {
      chatPanel.classList.remove('hidden', 'opacity-0', 'translate-y-4');
      requestAnimationFrame(function() {
        chatPanel.classList.add('opacity-100', 'translate-y-0');
      });
      chatIconOpen.classList.add('hidden');
      chatIconClose.classList.remove('hidden');
      chatInput.focus();
    } else {
      chatPanel.classList.add('opacity-0', 'translate-y-4');
      closeTimeout = setTimeout(function() {
        chatPanel.classList.add('hidden');
        closeTimeout = null;
      }, 300);
      chatIconOpen.classList.remove('hidden');
      chatIconClose.classList.add('hidden');
    }
  }

  if (toggleBtn) toggleBtn.addEventListener('click', toggleChat);
  if (minimizeBtn) minimizeBtn.addEventListener('click', toggleChat);
})();
</script>
{% endif %}
