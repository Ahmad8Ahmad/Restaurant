{% load static i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!doctype html>
<html dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}" lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "طعميني" %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Lalezar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <link rel="stylesheet" href="{% static 'css/dist.css' %}">

    <style>
        /* دمج الخطوط مع Tailwind */
        body { font-family: 'Cairo', sans-serif; }
        .font-lalezar { font-family: 'Lalezar', cursive; }
        h1, h2, h3 { font-family: 'Lalezar', cursive; }
        
        /* تصليح تضارب Tailwind مع Leaflet (مهم جداً) */
        .leaflet-container { z-index: 0 !important; }

        /* زر إظهار/إخفاء كلمة المرور - يتكيف مع RTL و LTR */
        .password-toggle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        [dir="rtl"] .password-toggle {
            left: 0.75rem;
            right: auto;
        }
        [dir="ltr"] .password-toggle {
            right: 0.75rem;
            left: auto;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    {% include 'navbar.html' %}

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
function togglePassword(btn) {
    var input = btn.parentElement.querySelector('input');
    var open = btn.querySelector('.eye-open');
    var closed = btn.querySelector('.eye-closed');
    if (input.type === 'password') {
        input.type = 'text';
        if (open) open.classList.add('hidden');
        if (closed) closed.classList.remove('hidden');
    } else {
        input.type = 'password';
        if (open) open.classList.remove('hidden');
        if (closed) closed.classList.add('hidden');
    }
}
</script>

{% if user.is_superuser %}
<div id="notification-toast" class="hidden fixed top-5 right-5 bg-orange-500 text-white p-4 rounded-lg shadow-2xl z-50 animate-bounce">
    <p id="notif-message"></p>
    <button onclick="location.reload()" class="underline font-bold">{% trans "تحديث الصفحة" %}</button>
</div>

<script>
    const socket = new WebSocket('ws://' + window.location.host + '/ws/notifications/');

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const toast = document.getElementById('notification-toast');
        const msg = document.getElementById('notif-message');
        
        // تشغيل صوت تنبيه
        new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3').play();
        
        // إظهار التنبيه
        msg.innerText = "🔔 " + data.message;
        toast.classList.remove('hidden');
        
        // إخفاء التنبيه بعد 10 ثواني
        setTimeout(() => { toast.classList.add('hidden'); }, 10000);
    };
</script>
{% endif %}
</body>
</html>
